<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="neoArt">
            <rect x="8" y="8" width="104" height="104" rx="2"/>
        </clipPath>
        <linearGradient id="neoFade">
            <stop offset="0.88" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="neoText"><rect x="132" y="32" width="214" height="72" fill="url(#neoFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 17px; font-weight: 700; fill: #f0f2f1; letter-spacing: -0.2px; }
        .artist { font-size: 13px; font-weight: 500; fill: #a7aca9; }
        .album { font-size: 11px; font-weight: 400; fill: #6f7773; }
        .status { font-size: 11px; font-weight: 600; fill: #a7aca9; }
        .status-playing { fill: #1ed760; }
        .no-media { font-size: 15px; font-weight: 500; fill: #7f8884; }
        .hint { font-size: 11px; fill: #58615d; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0.5" y="0.5" width="399" height="119" rx="4" fill="#10161d" stroke="#2b343a"/>
    <line x1="120.5" y1="8" x2="120.5" y2="112" stroke="#2b343a"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="8" y="8" width="104" height="104" clip-path="url(#neoArt)"
                       preserveAspectRatio="xMidYMid slice"/>
            {% else %}
                <rect x="8" y="8" width="104" height="104" rx="2" fill="#1a2229"/>
                <text x="60" y="69" text-anchor="middle" font-size="30" fill="#55615b">♪</text>
            {% endif %}

            {% if media_info.is_playing %}
                <circle class="status-playing" cx="136" cy="20" r="3.5"/>
                <text x="146" y="24" class="status">On air</text>
            {% else %}
                <circle cx="136" cy="20" r="3.5" fill="#68716d"/>
                <text x="146" y="24" class="status">Standby</text>
            {% endif %}

            <g mask="url(#neoText)">
                <text x="132" y="{{ 52 if has_album else 59 }}" class="title">{{ (media_info.title)|truncate(36, true, '', 0) }}</text>
                <text x="132" y="{{ 75 if has_album else 83 }}" class="artist">{{ (media_info.artist or '')|truncate(42, true, '', 0) }}</text>
                {% if has_album %}
                <text x="132" y="96" class="album">{{ (media_info.album)|truncate(44, true, '', 0) }}</text>
                {% endif %}
            </g>

            {% if media_info.is_playing %}
                <g class="status-playing" transform="translate(363, 92)">
                    <rect x="0" width="3" rx="1" y="-8" height="8">
                        <animate attributeName="height" values="5;14;5" dur="0.9s" repeatCount="indefinite"/>
                        <animate attributeName="y" values="-5;-14;-5" dur="0.9s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="7" width="3" rx="1" y="-14" height="14">
                        <animate attributeName="height" values="14;6;14" dur="0.78s" begin="-0.2s" repeatCount="indefinite"/>
                        <animate attributeName="y" values="-14;-6;-14" dur="0.78s" begin="-0.2s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="14" width="3" rx="1" y="-10" height="10">
                        <animate attributeName="height" values="7;16;7" dur="1.05s" begin="-0.4s" repeatCount="indefinite"/>
                        <animate attributeName="y" values="-7;-16;-7" dur="1.05s" begin="-0.4s" repeatCount="indefinite"/>
                    </rect>
                </g>
                <line x1="132" y1="108" x2="170" y2="108" stroke="#1ed760" stroke-width="2"/>
            {% else %}
                <g fill="#68716d">
                    <rect x="366" y="80" width="4" height="14" rx="1"/>
                    <rect x="374" y="80" width="4" height="14" rx="1"/>
                </g>
                <line x1="132" y1="108" x2="170" y2="108" stroke="#46504b" stroke-width="2"/>
            {% endif %}
        {% else %}
            <rect x="8" y="8" width="104" height="104" rx="2" fill="#1a2229"/>
            <text x="60" y="69" text-anchor="middle" font-size="30" fill="#46504b">♪</text>
            <text x="132" y="57" class="no-media">No audio source</text>
            <text x="132" y="78" class="hint">Waiting for playback data</text>
        {% endif %}
    </g>
</svg>
