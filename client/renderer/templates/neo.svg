<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <linearGradient id="neoBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#1b2740"/>
        </linearGradient>
        <linearGradient id="neoAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#06ffa5"/>
            <stop offset="100%" stop-color="#00d4ff"/>
        </linearGradient>
        <clipPath id="neoArt">
            <rect x="18" y="18" width="84" height="84" rx="10"/>
        </clipPath>
        <filter id="neoGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="neoFade">
            <stop offset="0.86" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="neoTitle"><rect x="130" y="4" width="236" height="56" fill="url(#neoFade)"/></mask>
        <mask id="neoBody"><rect x="120" y="56" width="262" height="42" fill="url(#neoFade)"/></mask>
    </defs>

    <style>
        .mono   { font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, 'SF Mono', Menlo, 'Courier New', monospace; }
        .title  { font-size: 15px; font-weight: 700; fill: #e2e8f0; }
        .artist { font-size: 12px; font-weight: 400; fill: #94a3b8; }
        .album  { font-size: 11px; font-weight: 400; fill: #64748b; }
        .bracket{ font-size: 15px; font-weight: 700; fill: #06ffa5; }
        .label  { font-size: 10px; font-weight: 700; letter-spacing: 1px; }
        .label-playing { fill: #06ffa5; }
        .label-paused  { fill: #fbbf24; }
        .no-media { font-size: 15px; font-weight: 500; fill: #64748b; text-anchor: middle; }
        .hint { font-size: 11px; fill: #475569; text-anchor: middle; }
        {{ custom_css | safe }}
    </style>

    <rect x="0.5" y="0.5" width="399" height="119" rx="14" fill="url(#neoBg)" stroke="#334155" stroke-width="1"/>

    <g class="mono">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="18" y="18" width="84" height="84" clip-path="url(#neoArt)"
                       preserveAspectRatio="xMidYMid slice"/>
                <rect x="18" y="18" width="84" height="84" rx="10" fill="none" stroke="#06ffa5" stroke-opacity="0.25"/>
            {% else %}
                <rect x="18" y="18" width="84" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
                <text x="60" y="56" text-anchor="middle" font-size="22" fill="#06ffa5">♪</text>
                <text x="60" y="74" text-anchor="middle" font-size="9" fill="#64748b">AUDIO</text>
            {% endif %}

            <!-- Title with code brackets -->
            <text x="118" y="{{ 44 if has_album else 52 }}" class="bracket">[</text>
            <g mask="url(#neoTitle)">
                <text x="130" y="{{ 44 if has_album else 52 }}" class="title">{{ (media_info.title)|truncate(40, true, '', 0) }}</text>
            </g>
            <text x="382" y="{{ 44 if has_album else 52 }}" class="bracket" text-anchor="end">]</text>

            <g mask="url(#neoBody)">
                <text x="120" y="{{ 64 if has_album else 74 }}" class="artist">{{ (media_info.artist or '')|truncate(46, true, '', 0) }}</text>
                {% if has_album %}
                <text x="120" y="82" class="album">{{ (media_info.album)|truncate(50, true, '', 0) }}</text>
                {% endif %}
            </g>

            {% if media_info.is_playing %}
                <g transform="translate(120, 100)" fill="url(#neoAccent)" filter="url(#neoGlow)">
                    <rect x="0"  width="3" rx="1.5" y="-6"  height="6" ><animate attributeName="height" values="4;12;4"  dur="0.85s" begin="0s"     repeatCount="indefinite"/><animate attributeName="y" values="-4;-12;-4"  dur="0.85s" begin="0s"     repeatCount="indefinite"/></rect>
                    <rect x="6"  width="3" rx="1.5" y="-10" height="10"><animate attributeName="height" values="10;4;10" dur="0.75s" begin="-0.3s"  repeatCount="indefinite"/><animate attributeName="y" values="-10;-4;-10" dur="0.75s" begin="-0.3s"  repeatCount="indefinite"/></rect>
                    <rect x="12" width="3" rx="1.5" y="-8"  height="8" ><animate attributeName="height" values="5;13;5"  dur="0.95s" begin="-0.15s" repeatCount="indefinite"/><animate attributeName="y" values="-5;-13;-5"  dur="0.95s" begin="-0.15s" repeatCount="indefinite"/></rect>
                    <rect x="18" width="3" rx="1.5" y="-9"  height="9" ><animate attributeName="height" values="9;4;9"   dur="0.7s"  begin="-0.5s"  repeatCount="indefinite"/><animate attributeName="y" values="-9;-4;-9"   dur="0.7s"  begin="-0.5s"  repeatCount="indefinite"/></rect>
                </g>
                <rect x="18" y="106" width="364" height="2.5" rx="1.25" fill="url(#neoAccent)"/>
                <text x="382" y="98" class="label label-playing" text-anchor="end">&#9654; PLAYING</text>
            {% else %}
                <rect x="18" y="106" width="364" height="2.5" rx="1.25" fill="#334155"/>
                <text x="382" y="98" class="label label-paused" text-anchor="end">&#10073;&#10073; PAUSED</text>
            {% endif %}
        {% else %}
            <rect x="18" y="18" width="84" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
            <text x="60" y="66" text-anchor="middle" font-size="26" fill="#334155">♪</text>
            <text x="250" y="52" class="no-media">{ no_signal }</text>
            <text x="250" y="74" class="hint">// waiting for audio input</text>
        {% endif %}
    </g>
</svg>
