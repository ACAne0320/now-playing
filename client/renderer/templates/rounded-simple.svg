<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="simpArt">
            <rect x="20" y="20" width="80" height="80" rx="16"/>
        </clipPath>
        <filter id="simpShadow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
        </filter>
        <linearGradient id="simpFade">
            <stop offset="0.86" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="simpText"><rect x="124" y="30" width="216" height="60" fill="url(#simpFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
        .title  { font-size: 20px; font-weight: 700; fill: #ffffff; letter-spacing: -0.3px; }
        .artist { font-size: 15px; font-weight: 500; fill: #9a9a9a; }
        .no-media { font-size: 18px; font-weight: 500; fill: #6a6a6a; text-anchor: middle; }
        {{ custom_css | safe }}
    </style>

    <rect width="400" height="120" rx="20" fill="#181818"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="20" y="20" width="80" height="80" clip-path="url(#simpArt)"
                       preserveAspectRatio="xMidYMid slice" filter="url(#simpShadow)"/>
                <rect x="20" y="20" width="80" height="80" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
            {% else %}
                <rect x="20" y="20" width="80" height="80" rx="16" fill="#2a2a2a" filter="url(#simpShadow)"/>
                <g transform="translate(60,60) scale(1.6)" fill="#555555">
                    <path d="M-2.6 -12 L9 -14 L9 -9 L-2.6 -7 Z"/>
                    <rect x="-2.6" y="-12" width="2.2" height="15.5" rx="1.1"/>
                    <rect x="6.8" y="-14" width="2.2" height="15.5" rx="1.1"/>
                    <ellipse cx="-5" cy="3.8" rx="4" ry="3"/>
                    <ellipse cx="5" cy="1.8" rx="4" ry="3"/>
                </g>
            {% endif %}

            <g mask="url(#simpText)">
                <text x="124" y="57" class="title">{{ (media_info.title)|truncate(44, true, '', 0) }}</text>
                <text x="124" y="80" class="artist">{{ (media_info.artist or '')|truncate(48, true, '', 0) }}</text>
            </g>

            {% if media_info.is_playing %}
                <g transform="translate(348, 70)" fill="#1ed760">
                    <rect x="0"  width="4" rx="2" y="-8"  height="8" ><animate attributeName="height" values="6;18;6"  dur="0.9s"  begin="0s"     repeatCount="indefinite"/><animate attributeName="y" values="-6;-18;-6"  dur="0.9s"  begin="0s"     repeatCount="indefinite"/></rect>
                    <rect x="8"  width="4" rx="2" y="-14" height="14"><animate attributeName="height" values="14;6;14" dur="0.8s"  begin="-0.3s"  repeatCount="indefinite"/><animate attributeName="y" values="-14;-6;-14" dur="0.8s"  begin="-0.3s"  repeatCount="indefinite"/></rect>
                    <rect x="16" width="4" rx="2" y="-10" height="10"><animate attributeName="height" values="8;20;8"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/><animate attributeName="y" values="-8;-20;-8"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/></rect>
                </g>
            {% else %}
                <g transform="translate(352, 60)" fill="#555555">
                    <rect x="0" y="-9" width="5" height="18" rx="2"/>
                    <rect x="9" y="-9" width="5" height="18" rx="2"/>
                </g>
            {% endif %}
        {% else %}
            <rect x="20" y="20" width="80" height="80" rx="16" fill="#2a2a2a"/>
            <g transform="translate(60,60) scale(1.6)" fill="#4a4a4a">
                <path d="M-2.6 -12 L9 -14 L9 -9 L-2.6 -7 Z"/>
                <rect x="-2.6" y="-12" width="2.2" height="15.5" rx="1.1"/>
                <rect x="6.8" y="-14" width="2.2" height="15.5" rx="1.1"/>
                <ellipse cx="-5" cy="3.8" rx="4" ry="3"/>
                <ellipse cx="5" cy="1.8" rx="4" ry="3"/>
            </g>
            <text x="250" y="66" class="no-media">No music playing</text>
        {% endif %}
    </g>
</svg>
