<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="simpArt">
            <rect x="24" y="36" width="48" height="48" rx="4"/>
        </clipPath>
        <linearGradient id="simpFade">
            <stop offset="0.88" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="simpText"><rect x="88" y="36" width="218" height="48" fill="url(#simpFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 16px; font-weight: 700; fill: #f7f7f5; letter-spacing: -0.15px; }
        .artist { font-size: 13px; font-weight: 400; fill: #999994; }
        .status { font-size: 10px; font-weight: 600; fill: #999994; text-anchor: middle; }
        .status-playing { fill: #1ed760; }
        .no-media { font-size: 14px; font-weight: 500; fill: #8a8a85; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="12.5" y="24.5" width="375" height="71" rx="10" fill="#171717" stroke="#30302e"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="24" y="36" width="48" height="48" clip-path="url(#simpArt)"
                       preserveAspectRatio="xMidYMid slice"/>
            {% else %}
                <rect x="24" y="36" width="48" height="48" rx="4" fill="#292927"/>
                <text x="48" y="67" text-anchor="middle" font-size="20" fill="#60605b">♪</text>
            {% endif %}

            <g mask="url(#simpText)">
                <text x="88" y="57" class="title">{{ (media_info.title)|truncate(42, true, '', 0) }}</text>
                <text x="88" y="78" class="artist">{{ (media_info.artist or '')|truncate(46, true, '', 0) }}</text>
            </g>

            {% if media_info.is_playing %}
                <path class="status-playing" d="M340 48 L340 64 L353 56 Z"/>
                <text x="346" y="79" class="status">Playing</text>
            {% else %}
                <g fill="#686864">
                    <rect x="340" y="48" width="4" height="16" rx="1"/>
                    <rect x="348" y="48" width="4" height="16" rx="1"/>
                </g>
                <text x="346" y="79" class="status">Paused</text>
            {% endif %}
        {% else %}
            <rect x="24" y="36" width="48" height="48" rx="4" fill="#292927"/>
            <text x="48" y="67" text-anchor="middle" font-size="20" fill="#555550">♪</text>
            <text x="88" y="65" class="no-media">Nothing is playing</text>
        {% endif %}
    </g>
</svg>
