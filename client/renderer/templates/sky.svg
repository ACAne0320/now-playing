<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <linearGradient id="skyBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f5f7fa"/>
        </linearGradient>
        <linearGradient id="skyAccent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <clipPath id="skyCircle">
            <circle cx="62" cy="60" r="38"/>
        </clipPath>
        <linearGradient id="skyFade">
            <stop offset="0.85" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="skyWide"><rect x="124" y="4" width="198" height="84" fill="url(#skyFade)"/></mask>
        <mask id="skyNarrow"><rect x="124" y="80" width="156" height="36" fill="url(#skyFade)"/></mask>
        <filter id="skyShadow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1f2937" flood-opacity="0.18"/>
        </filter>
    </defs>

    <style>
        .container { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .title  { font-size: 19px; font-weight: 700; fill: #111827; letter-spacing: -0.2px; }
        .artist { font-size: 14px; font-weight: 500; fill: #6b7280; }
        .album  { font-size: 12px; font-weight: 400; fill: #9ca3af; }
        .label  { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; }
        .label-playing { fill: #6366f1; }
        .label-paused  { fill: #9ca3af; }
        .no-media { font-size: 16px; font-weight: 500; fill: #9ca3af; text-anchor: middle; }
        {{ custom_css | safe }}
    </style>

    <rect x="0.5" y="0.5" width="399" height="119" rx="18" fill="url(#skyBg)" stroke="#e9ebef" stroke-width="1"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            <!-- Album art (circular) -->
            {% if media_info.album_art_b64 %}
                <circle cx="62" cy="60" r="40" fill="#ffffff" filter="url(#skyShadow)"/>
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="24" y="22" width="76" height="76" clip-path="url(#skyCircle)"
                       preserveAspectRatio="xMidYMid slice"/>
                <circle cx="62" cy="60" r="38" fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>
            {% else %}
                <circle cx="62" cy="60" r="40" fill="#ffffff" filter="url(#skyShadow)"/>
                <circle cx="62" cy="60" r="38" fill="#eef0f4"/>
                <g transform="translate(62,60) scale(1.55)" fill="#c4c9d4">
                    <path d="M-2.6 -12 L9 -14 L9 -9 L-2.6 -7 Z"/>
                    <rect x="-2.6" y="-12" width="2.2" height="15.5" rx="1.1"/>
                    <rect x="6.8" y="-14" width="2.2" height="15.5" rx="1.1"/>
                    <ellipse cx="-5" cy="3.8" rx="4" ry="3"/>
                    <ellipse cx="5" cy="1.8" rx="4" ry="3"/>
                </g>
            {% endif %}

            <!-- Text -->
            <g mask="url(#skyWide)">
                <text x="124" y="{{ 50 if has_album else 56 }}" class="title">{{ (media_info.title)|truncate(48, true, '', 0) }}</text>
                <text x="124" y="{{ 72 if has_album else 80 }}" class="artist">{{ (media_info.artist or '')|truncate(52, true, '', 0) }}</text>
            </g>
            {% if has_album %}
            <g mask="url(#skyNarrow)">
                <text x="124" y="92" class="album">{{ (media_info.album)|truncate(56, true, '', 0) }}</text>
            </g>
            {% endif %}

            <!-- Status -->
            {% if media_info.is_playing %}
                <g transform="translate(330, 70)" fill="url(#skyAccent)">
                    <rect x="0"  width="4" rx="2" y="-8"  height="8" ><animate attributeName="height" values="6;20;6"  dur="0.9s"  begin="0s"    repeatCount="indefinite"/><animate attributeName="y" values="-6;-20;-6"  dur="0.9s"  begin="0s"    repeatCount="indefinite"/></rect>
                    <rect x="8"  width="4" rx="2" y="-16" height="16"><animate attributeName="height" values="16;7;16" dur="0.8s"  begin="-0.3s" repeatCount="indefinite"/><animate attributeName="y" values="-16;-7;-16" dur="0.8s"  begin="-0.3s" repeatCount="indefinite"/></rect>
                    <rect x="16" width="4" rx="2" y="-11" height="11"><animate attributeName="height" values="9;22;9"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/><animate attributeName="y" values="-9;-22;-9"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/></rect>
                    <rect x="24" width="4" rx="2" y="-14" height="14"><animate attributeName="height" values="13;5;13" dur="0.75s" begin="-0.5s" repeatCount="indefinite"/><animate attributeName="y" values="-13;-5;-13" dur="0.75s" begin="-0.5s" repeatCount="indefinite"/></rect>
                </g>
                <text x="376" y="92" class="label label-playing" text-anchor="end">NOW PLAYING</text>
            {% else %}
                <g transform="translate(338, 56)" fill="#c4c9d4">
                    <rect x="0" y="-9" width="5" height="18" rx="2"/>
                    <rect x="9" y="-9" width="5" height="18" rx="2"/>
                </g>
                <text x="376" y="92" class="label label-paused" text-anchor="end">PAUSED</text>
            {% endif %}
        {% else %}
            <circle cx="62" cy="60" r="38" fill="#eef0f4"/>
            <g transform="translate(62,60) scale(1.55)" fill="#c4c9d4">
                <path d="M-2.6 -12 L9 -14 L9 -9 L-2.6 -7 Z"/>
                <rect x="-2.6" y="-12" width="2.2" height="15.5" rx="1.1"/>
                <rect x="6.8" y="-14" width="2.2" height="15.5" rx="1.1"/>
                <ellipse cx="-5" cy="3.8" rx="4" ry="3"/>
                <ellipse cx="5" cy="1.8" rx="4" ry="3"/>
            </g>
            <text x="250" y="65" class="no-media">No music playing</text>
        {% endif %}
    </g>
</svg>
