<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Now playing">
    <defs>
        <linearGradient id="minFade">
            <stop offset="0.88" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="minText"><rect x="24" y="14" width="226" height="52" fill="url(#minFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 15px; font-weight: 700; fill: #20201e; letter-spacing: -0.15px; }
        .artist { font-size: 12px; font-weight: 400; fill: #74746f; }
        .status-playing { stroke: #238636; fill: #238636; }
        .no-media { font-size: 13px; font-weight: 500; fill: #85857f; }
        .eq rect { transform-box: fill-box; transform-origin: 50% 100%; animation: min-eq 0.9s ease-in-out infinite alternate; }
        @keyframes min-eq { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
        @media (prefers-reduced-motion: reduce) { .eq rect { animation: none; } }
        {{ custom_css | safe }}
    </style>

    <g class="container">
        {% if media_info and media_info.title %}
            {% if media_info.is_playing %}
                <line class="status-playing" x1="8" y1="10" x2="8" y2="70" stroke-width="2"/>
            {% else %}
                <line x1="8" y1="10" x2="8" y2="70" stroke="#b9b9b3" stroke-width="2"/>
            {% endif %}

            <g mask="url(#minText)">
                <text x="24" y="34" class="title">{{ (media_info.title)|truncate(38, true, '', 0) }}</text>
                <text x="24" y="55" class="artist">{{ (media_info.artist or '')|truncate(44, true, '', 0) }}</text>
            </g>

            {% if media_info.is_playing %}
                <g class="eq status-playing" stroke="none">
                    <rect x="270" y="34" width="3.5" height="14" rx="1" style="animation-duration: 0.7s;"/>
                    <rect x="276" y="34" width="3.5" height="14" rx="1" style="animation-duration: 0.9s; animation-delay: -0.3s;"/>
                    <rect x="282" y="34" width="3.5" height="14" rx="1" style="animation-duration: 0.8s; animation-delay: -0.15s;"/>
                </g>
            {% else %}
                <g fill="#999994">
                    <rect x="272" y="34" width="3" height="12" rx="1"/>
                    <rect x="278" y="34" width="3" height="12" rx="1"/>
                </g>
            {% endif %}
        {% else %}
            <line x1="8" y1="10" x2="8" y2="70" stroke="#b9b9b3" stroke-width="2"/>
            <text x="24" y="45" class="no-media">Nothing is playing</text>
        {% endif %}
    </g>
</svg>
