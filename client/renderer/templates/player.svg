<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="plArt">
            <rect x="316" y="18" width="68" height="84" rx="4"/>
        </clipPath>
        <linearGradient id="plFade">
            <stop offset="0.88" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="plText"><rect x="24" y="34" width="274" height="66" fill="url(#plFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 17px; font-weight: 700; fill: #1c1c1a; letter-spacing: -0.2px; }
        .artist { font-size: 13px; font-weight: 500; fill: #62625e; }
        .album { font-size: 11px; font-weight: 400; fill: #777772; }
        .status { font-size: 10px; font-weight: 600; fill: #62625e; }
        .status-playing { fill: #238636; }
        .no-media { font-size: 15px; font-weight: 500; fill: #777772; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0.5" y="0.5" width="399" height="119" rx="6" fill="#f7f7f5" stroke="#d7d7d2"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}

            {% if media_info.is_playing %}
                <circle class="status-playing" cx="28" cy="24" r="3.5"/>
                <text x="38" y="28" class="status">Playing</text>
            {% else %}
                <circle cx="28" cy="24" r="3.5" fill="#999994"/>
                <text x="38" y="28" class="status">Paused</text>
            {% endif %}

            <g mask="url(#plText)">
                <text x="24" y="{{ 53 if has_album else 60 }}" class="title">{{ (media_info.title)|truncate(44, true, '', 0) }}</text>
                <text x="24" y="{{ 74 if has_album else 83 }}" class="artist">{{ (media_info.artist or '')|truncate(48, true, '', 0) }}</text>
                {% if has_album %}
                <text x="24" y="94" class="album">{{ (media_info.album)|truncate(50, true, '', 0) }}</text>
                {% endif %}
            </g>

            {% if media_info.album_art_b64 %}
                <image href="{{ media_info.album_art_data_uri }}"
                       x="316" y="18" width="68" height="84" clip-path="url(#plArt)"
                       preserveAspectRatio="xMidYMid slice"/>
            {% else %}
                <rect x="316" y="18" width="68" height="84" rx="4" fill="#e2e2de"/>
                <text x="350" y="68" text-anchor="middle" font-size="26" fill="#9a9a94">♪</text>
            {% endif %}
        {% else %}
            <text x="24" y="65" class="no-media">Nothing is playing</text>
            <rect x="316" y="18" width="68" height="84" rx="4" fill="#e2e2de"/>
            <text x="350" y="68" text-anchor="middle" font-size="26" fill="#aaa9a3">♪</text>
        {% endif %}
    </g>
</svg>
