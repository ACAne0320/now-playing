<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <linearGradient id="plBtn" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#10b981"/>
        </linearGradient>
        <clipPath id="plArt">
            <rect x="28" y="28" width="64" height="64" rx="14"/>
        </clipPath>
        <filter id="plRaise" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="5" dy="5" stdDeviation="8" flood-color="#c3cbd8" flood-opacity="0.9"/>
            <feDropShadow dx="-5" dy="-5" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.95"/>
        </filter>
        <filter id="plSoft" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#b8c0cf" flood-opacity="0.8"/>
        </filter>
        <linearGradient id="plFade">
            <stop offset="0.85" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="plText"><rect x="112" y="28" width="200" height="68" fill="url(#plFade)"/></mask>
    </defs>

    <style>
        .container { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .title  { font-size: 17px; font-weight: 700; fill: #1e293b; letter-spacing: -0.2px; }
        .artist { font-size: 13px; font-weight: 500; fill: #64748b; }
        .album  { font-size: 11px; font-weight: 400; fill: #94a3b8; }
        .no-media { font-size: 16px; font-weight: 600; fill: #64748b; text-anchor: middle; }
        {{ custom_css | safe }}
    </style>

    <rect width="400" height="120" fill="#e9edf3"/>
    <rect x="14" y="14" width="372" height="92" rx="22" fill="#e9edf3" filter="url(#plRaise)"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="28" y="28" width="64" height="64" clip-path="url(#plArt)"
                       preserveAspectRatio="xMidYMid slice" filter="url(#plSoft)"/>
            {% else %}
                <rect x="28" y="28" width="64" height="64" rx="14" fill="#e9edf3" filter="url(#plSoft)"/>
                <text x="60" y="68" text-anchor="middle" font-size="24" fill="#94a3b8">♪</text>
            {% endif %}

            <g mask="url(#plText)">
                <text x="112" y="{{ 50 if has_album else 56 }}" class="title">{{ (media_info.title)|truncate(44, true, '', 0) }}</text>
                <text x="112" y="{{ 70 if has_album else 78 }}" class="artist">{{ (media_info.artist or '')|truncate(48, true, '', 0) }}</text>
                {% if has_album %}
                <text x="112" y="88" class="album">{{ (media_info.album)|truncate(52, true, '', 0) }}</text>
                {% endif %}
            </g>

            <!-- Status button -->
            {% if media_info.is_playing %}
                <rect x="322" y="40" width="40" height="40" rx="14" fill="url(#plBtn)" filter="url(#plSoft)"/>
                <g transform="translate(342, 68)" fill="#ffffff">
                    <rect x="-9" width="3.5" rx="1.75" y="-6" height="6" ><animate attributeName="height" values="4;13;4"  dur="0.85s" begin="0s"     repeatCount="indefinite"/><animate attributeName="y" values="-4;-13;-4"  dur="0.85s" begin="0s"     repeatCount="indefinite"/></rect>
                    <rect x="-2.5" width="3.5" rx="1.75" y="-10" height="10"><animate attributeName="height" values="11;5;11" dur="0.75s" begin="-0.3s"  repeatCount="indefinite"/><animate attributeName="y" values="-11;-5;-11" dur="0.75s" begin="-0.3s"  repeatCount="indefinite"/></rect>
                    <rect x="4" width="3.5" rx="1.75" y="-8" height="8" ><animate attributeName="height" values="6;14;6"  dur="0.95s" begin="-0.15s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-14;-6"  dur="0.95s" begin="-0.15s" repeatCount="indefinite"/></rect>
                </g>
            {% else %}
                <rect x="322" y="40" width="40" height="40" rx="14" fill="#e9edf3" filter="url(#plSoft)"/>
                <g transform="translate(342, 60)" fill="#94a3b8">
                    <rect x="-7" y="-8" width="5" height="16" rx="2"/>
                    <rect x="2" y="-8" width="5" height="16" rx="2"/>
                </g>
            {% endif %}
        {% else %}
            <rect x="28" y="28" width="64" height="64" rx="14" fill="#e9edf3" filter="url(#plSoft)"/>
            <text x="60" y="68" text-anchor="middle" font-size="24" fill="#cbd5e1">♪</text>
            <text x="240" y="65" class="no-media">No music playing</text>
        {% endif %}
    </g>
</svg>
