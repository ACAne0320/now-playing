<svg width="400" height="185" viewBox="0 0 400 185" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <pattern id="termScan" width="3" height="3" patternUnits="userSpaceOnUse">
            <rect y="2" width="3" height="1" fill="#000000" opacity="0.28"/>
        </pattern>
        <radialGradient id="termVig" cx="0.5" cy="0.45" r="0.75">
            <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
            <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
        </radialGradient>
        <filter id="termGlow" x="-5%" y="-5%" width="110%" height="110%">
            <feGaussianBlur stdDeviation="1.1" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="termFade">
            <stop offset="0.88" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="termMask"><rect x="20" y="40" width="372" height="132" fill="url(#termFade)"/></mask>
    </defs>

    <style>
        .term { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; font-size: 12.5px; }
        .tp { fill: #3c5a40; }
        .tc { fill: #d9ffd9; }
        .tl { fill: #4f7a52; }
        .tv { fill: #8fffa0; }
        .tw { fill: #ffd280; }
        .titlebar { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; font-size: 10px; fill: #3c5a40; }
        .blink { animation: term-blink 1.1s linear infinite; }
        @keyframes term-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        .eq rect { transform-box: fill-box; transform-origin: 50% 100%; animation: term-eq 0.9s ease-in-out infinite alternate; }
        @keyframes term-eq { from { transform: scaleY(0.25); } to { transform: scaleY(1); } }
        @media (prefers-reduced-motion: reduce) { .blink, .eq rect { animation: none; } }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0.5" y="0.5" width="399" height="184" rx="10" fill="#070a07" stroke="#1c2a1c"/>

    <!-- window chrome -->
    <circle cx="22" cy="19" r="5" fill="#ff5f57" opacity="0.85"/>
    <circle cx="40" cy="19" r="5" fill="#febc2e" opacity="0.85"/>
    <circle cx="58" cy="19" r="5" fill="#28c840" opacity="0.85"/>
    <text x="200" y="23" text-anchor="middle" class="titlebar">now-playing — 80×24</text>
    <line x1="10" y1="33" x2="390" y2="33" stroke="#1c2a1c"/>

    <g class="term" filter="url(#termGlow)">
        {% if media_info and media_info.title %}
        {% set state_y = 141 if media_info.album else 120 %}
        <g mask="url(#termMask)">
        <text x="20" y="56"><tspan class="tp">$ </tspan><tspan class="tc">now-playing --live</tspan></text>
        <text x="20" y="78"><tspan class="tl">TRACK  : </tspan><tspan class="tv">{{ (media_info.title)|truncate(38, true, '', 0) }}</tspan></text>
        <text x="20" y="99"><tspan class="tl">ARTIST : </tspan><tspan class="tv">{{ (media_info.artist or '')|truncate(38, true, '', 0) }}</tspan></text>
        {% if media_info.album %}
        <text x="20" y="120"><tspan class="tl">ALBUM  : </tspan><tspan class="tv">{{ (media_info.album)|truncate(38, true, '', 0) }}</tspan></text>
        {% endif %}
        <text x="20" y="{{ state_y }}"><tspan class="tl">STATE  : </tspan>{% if media_info.is_playing %}<tspan class="tv">» PLAYING</tspan>{% else %}<tspan class="tw">|| PAUSED</tspan>{% endif %}</text>
        <text x="20" y="{{ state_y + 21 }}" class="tp">$</text>
        </g>
        {% if media_info.is_playing %}
        <rect class="blink" x="31" y="{{ state_y + 11 }}" width="8" height="13" fill="#8fffa0"/>
        {% else %}
        <rect class="blink" x="31" y="{{ state_y + 11 }}" width="8" height="13" fill="#ffd280"/>
        {% endif %}
        {% if media_info.is_playing %}
        <g class="eq" fill="#46c46a">
            <rect x="320" y="132" width="8" height="30" rx="1.5" style="animation-duration: 0.68s;"/>
            <rect x="332" y="132" width="8" height="30" rx="1.5" style="animation-duration: 0.84s; animation-delay: -0.3s;"/>
            <rect x="344" y="132" width="8" height="30" rx="1.5" style="animation-duration: 1.02s; animation-delay: -0.5s;"/>
            <rect x="356" y="132" width="8" height="30" rx="1.5" style="animation-duration: 0.76s; animation-delay: -0.2s;"/>
            <rect x="368" y="132" width="8" height="30" rx="1.5" style="animation-duration: 0.94s; animation-delay: -0.4s;"/>
        </g>
        {% else %}
        <g fill="#3c5a40">
            <rect x="320" y="156" width="8" height="6" rx="1.5"/>
            <rect x="332" y="152" width="8" height="10" rx="1.5"/>
            <rect x="344" y="154" width="8" height="8" rx="1.5"/>
            <rect x="356" y="150" width="8" height="12" rx="1.5"/>
            <rect x="368" y="155" width="8" height="7" rx="1.5"/>
        </g>
        {% endif %}
        {% else %}
        <text x="20" y="56"><tspan class="tp">$ </tspan><tspan class="tc">now-playing --live</tspan></text>
        <text x="20" y="78" class="tw">&gt; audio source not found</text>
        <text x="20" y="99" class="tp">&gt; standing by</text>
        <text x="20" y="120" class="tp">$</text>
        <rect class="blink" x="31" y="110" width="8" height="13" fill="#8fffa0"/>
        {% endif %}
    </g>

    <!-- CRT overlay -->
    <rect x="10" y="40" width="380" height="137" fill="url(#termScan)"/>
    <rect x="0" y="0" width="400" height="185" fill="url(#termVig)"/>
</svg>
