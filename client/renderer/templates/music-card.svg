<svg width="320" height="400" viewBox="0 0 320 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="mcCard">
            <rect x="0.5" y="0.5" width="319" height="399" rx="8"/>
        </clipPath>
        <linearGradient id="mcFade">
            <stop offset="0.9" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="mcText"><rect x="20" y="290" width="280" height="98" fill="url(#mcFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 22px; font-weight: 700; fill: #f7f7f5; letter-spacing: -0.35px; }
        .artist { font-size: 15px; font-weight: 500; fill: #b5b5b0; }
        .album { font-size: 12px; font-weight: 400; fill: #777773; }
        .status { font-size: 11px; font-weight: 600; fill: #b5b5b0; }
        .status-playing { fill: #1ed760; }
        .no-media { font-size: 16px; font-weight: 500; fill: #8a8a85; text-anchor: middle; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0.5" y="0.5" width="319" height="399" rx="8" fill="#151515" stroke="#30302e"/>

    <g class="container" clip-path="url(#mcCard)">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="0" y="0" width="320" height="280"
                       preserveAspectRatio="xMidYMid slice"/>
            {% else %}
                <rect x="0" y="0" width="320" height="280" fill="#242422"/>
                <text x="160" y="158" text-anchor="middle" font-size="58" fill="#555550">♪</text>
            {% endif %}

            <line x1="0" y1="280.5" x2="320" y2="280.5" stroke="#30302e"/>

            {% if media_info.is_playing %}
                <circle class="status-playing" cx="22" cy="303" r="3.5"/>
                <text x="32" y="307" class="status">Playing now</text>
            {% else %}
                <circle cx="22" cy="303" r="3.5" fill="#686864"/>
                <text x="32" y="307" class="status">Paused</text>
            {% endif %}

            <g mask="url(#mcText)">
                <text x="20" y="338" class="title">{{ (media_info.title)|truncate(34, true, '', 0) }}</text>
                <text x="20" y="362" class="artist">{{ (media_info.artist or '')|truncate(42, true, '', 0) }}</text>
                {% if has_album %}
                <text x="20" y="384" class="album">{{ (media_info.album)|truncate(48, true, '', 0) }}</text>
                {% endif %}
            </g>
        {% else %}
            <rect x="0" y="0" width="320" height="280" fill="#242422"/>
            <text x="160" y="158" text-anchor="middle" font-size="58" fill="#4d4d49">♪</text>
            <line x1="0" y1="280.5" x2="320" y2="280.5" stroke="#30302e"/>
            <text x="160" y="347" class="no-media">Nothing is playing</text>
        {% endif %}
    </g>
</svg>
