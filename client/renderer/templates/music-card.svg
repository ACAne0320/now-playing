{% set full_art = media_info and media_info.album_art_b64 and media_info.album_art_is_at_least(240, 240) %}
{% set card_height = 400 if full_art else 136 %}
<svg width="320" height="{{ card_height }}" viewBox="0 0 320 {{ card_height }}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="mcCard">
            <rect x="0.5" y="0.5" width="319" height="{{ card_height - 1 }}" rx="8"/>
        </clipPath>
        <linearGradient id="mcFade">
            <stop offset="0.9" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="mcText"><rect x="20" y="290" width="280" height="98" fill="url(#mcFade)"/></mask>
        <mask id="mcCompactText"><rect x="128" y="38" width="172" height="82" fill="url(#mcFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 22px; font-weight: 700; fill: #f7f7f5; letter-spacing: -0.35px; }
        .compact-title { font-size: 18px; }
        .artist { font-size: 15px; font-weight: 500; fill: #b5b5b0; }
        .album { font-size: 12px; font-weight: 400; fill: #92928c; }
        .status { font-size: 11px; font-weight: 600; fill: #b5b5b0; }
        .status-playing { fill: #1ed760; }
        .no-media { font-size: 15px; font-weight: 500; fill: #8a8a85; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0.5" y="0.5" width="319" height="{{ card_height - 1 }}" rx="8" fill="#151515" stroke="#30302e"/>

    <g class="container" clip-path="url(#mcCard)">
        {% if full_art %}
            <image class="artwork artwork-fill" href="{{ media_info.album_art_data_uri }}"
                   x="0" y="0" width="320" height="280"
                   preserveAspectRatio="xMidYMid slice"/>
            <line x1="0" y1="280.5" x2="320" y2="280.5" stroke="#30302e"/>

            {% if media_info.is_playing %}
                <circle class="status-playing" cx="22" cy="303" r="3.5"/>
                <text x="32" y="307" class="status">Playing</text>
            {% else %}
                <circle cx="22" cy="303" r="3.5" fill="#686864"/>
                <text x="32" y="307" class="status">Paused</text>
            {% endif %}

            <g mask="url(#mcText)">
                <text x="20" y="338" class="title">{{ (media_info.title)|truncate(34, true, '', 0) }}</text>
                <text x="20" y="362" class="artist">{{ (media_info.artist or '')|truncate(42, true, '', 0) }}</text>
                {% if media_info.album %}
                <text x="20" y="384" class="album">{{ (media_info.album)|truncate(48, true, '', 0) }}</text>
                {% endif %}
            </g>
        {% else %}
            <rect x="0" y="0" width="112" height="136" fill="#20201e"/>
            {% if media_info and media_info.title and media_info.album_art_b64 %}
                {% set art_size = media_info.album_art_fit(88, 88) %}
                {% set art_x = 16 + (88 - art_size[0]) / 2 %}
                {% set art_y = 24 + (88 - art_size[1]) / 2 %}
                <rect x="16" y="24" width="88" height="88" rx="3" fill="#292927"/>
                <image class="artwork artwork-inset" href="{{ media_info.album_art_data_uri }}"
                       x="{{ art_x }}" y="{{ art_y }}"
                       width="{{ art_size[0] }}" height="{{ art_size[1] }}"
                       preserveAspectRatio="xMidYMid meet"/>
                <rect x="15.5" y="23.5" width="89" height="89" rx="3.5"
                      fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
            {% else %}
                <rect x="16" y="24" width="88" height="88" rx="3" fill="#292927"/>
                <text x="60" y="78" text-anchor="middle" font-size="34" fill="#555550">♪</text>
            {% endif %}
            <line x1="112.5" y1="0" x2="112.5" y2="136" stroke="#30302e"/>

            {% if media_info and media_info.title %}
                {% if media_info.is_playing %}
                    <circle class="status-playing" cx="132" cy="24" r="3.5"/>
                    <text x="142" y="28" class="status">Playing</text>
                {% else %}
                    <circle cx="132" cy="24" r="3.5" fill="#686864"/>
                    <text x="142" y="28" class="status">Paused</text>
                {% endif %}

                <g mask="url(#mcCompactText)">
                    <text x="128" y="61" class="title compact-title">{{ (media_info.title)|truncate(24, true, '', 0) }}</text>
                    <text x="128" y="84" class="artist">{{ (media_info.artist or '')|truncate(28, true, '', 0) }}</text>
                    {% if media_info.album %}
                    <text x="128" y="106" class="album">{{ (media_info.album)|truncate(32, true, '', 0) }}</text>
                    {% endif %}
                </g>
            {% else %}
                <text x="128" y="73" class="no-media">Nothing is playing</text>
            {% endif %}
        {% endif %}
    </g>
</svg>
