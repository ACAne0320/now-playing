<svg width="320" height="400" viewBox="0 0 320 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <linearGradient id="mcBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1d1d1d"/>
            <stop offset="100%" stop-color="#121212"/>
        </linearGradient>
        <linearGradient id="mcArtFade" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
        </linearGradient>
        <clipPath id="mcArt">
            <rect x="16" y="16" width="288" height="288" rx="16"/>
        </clipPath>
        <linearGradient id="mcFade">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="0.07" stop-color="#ffffff"/>
            <stop offset="0.93" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="mcText"><rect x="16" y="318" width="288" height="82" fill="url(#mcFade)"/></mask>
        <filter id="mcShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <style>
        .container { font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title  { font-size: 21px; font-weight: 700; fill: #ffffff; text-anchor: middle; letter-spacing: -0.3px; }
        .artist { font-size: 15px; font-weight: 500; fill: #b3b3b3; text-anchor: middle; }
        .album  { font-size: 12px; font-weight: 400; fill: #7d7d7d; text-anchor: middle; }
        .badge-label { font-size: 9px; font-weight: 700; letter-spacing: 1.1px; }
        .no-media { font-size: 18px; font-weight: 500; fill: #7d7d7d; text-anchor: middle; }
        {{ custom_css | safe }}
    </style>

    <rect width="320" height="400" rx="22" fill="url(#mcBg)"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            <!-- Album art -->
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="16" y="16" width="288" height="288" clip-path="url(#mcArt)"
                       preserveAspectRatio="xMidYMid slice" filter="url(#mcShadow)"/>
                <rect x="16" y="216" width="288" height="88" fill="url(#mcArtFade)" clip-path="url(#mcArt)"/>
                <rect x="16" y="16" width="288" height="288" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
            {% else %}
                <rect x="16" y="16" width="288" height="288" rx="16" fill="#262626" filter="url(#mcShadow)"/>
                <path d="M150 120 v70 a16 16 0 1 1 -9 -14 V140 l38 -9 v46 a16 16 0 1 1 -9 -14 V112 Z" fill="#4d4d4d"/>
            {% endif %}

            <!-- Now playing badge on artwork -->
            {% if media_info.is_playing %}
                <g transform="translate(32, 264)">
                    <rect width="128" height="28" rx="14" fill="#000000" fill-opacity="0.5"/>
                    <g transform="translate(16, 20)" fill="#1ed760">
                        <rect x="0"  width="3" rx="1.5" y="-7"  height="7" ><animate attributeName="height" values="5;13;5"  dur="0.9s"  begin="0s"     repeatCount="indefinite"/><animate attributeName="y" values="-5;-13;-5"  dur="0.9s"  begin="0s"     repeatCount="indefinite"/></rect>
                        <rect x="6"  width="3" rx="1.5" y="-11" height="11"><animate attributeName="height" values="11;5;11" dur="0.8s"  begin="-0.3s"  repeatCount="indefinite"/><animate attributeName="y" values="-11;-5;-11" dur="0.8s"  begin="-0.3s"  repeatCount="indefinite"/></rect>
                        <rect x="12" width="3" rx="1.5" y="-9"  height="9" ><animate attributeName="height" values="7;14;7"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/><animate attributeName="y" values="-7;-14;-7"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/></rect>
                    </g>
                    <text x="38" y="18" class="badge-label" fill="#1ed760">NOW PLAYING</text>
                </g>
            {% else %}
                <g transform="translate(32, 264)">
                    <rect width="96" height="28" rx="14" fill="#000000" fill-opacity="0.5"/>
                    <g transform="translate(15, 11)" fill="#cfcfcf">
                        <rect x="0" y="0" width="3" height="6" rx="1"/>
                        <rect x="5" y="0" width="3" height="6" rx="1"/>
                    </g>
                    <text x="32" y="18" class="badge-label" fill="#cfcfcf">PAUSED</text>
                </g>
            {% endif %}

            <!-- Text -->
            <g mask="url(#mcText)">
                <text x="160" y="340" class="title">{{ (media_info.title)|truncate(44, true, '', 0) }}</text>
                <text x="160" y="364" class="artist">{{ (media_info.artist or '')|truncate(50, true, '', 0) }}</text>
                {% if has_album %}
                <text x="160" y="385" class="album">{{ (media_info.album)|truncate(56, true, '', 0) }}</text>
                {% endif %}
            </g>
        {% else %}
            <rect x="16" y="16" width="288" height="288" rx="16" fill="#262626"/>
            <path d="M150 120 v70 a16 16 0 1 1 -9 -14 V140 l38 -9 v46 a16 16 0 1 1 -9 -14 V112 Z" fill="#3d3d3d"/>
            <text x="160" y="360" class="no-media">No music playing</text>
        {% endif %}
    </g>
</svg>
