<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="rndCard">
            <rect x="0.5" y="0.5" width="399" height="119" rx="18"/>
        </clipPath>
        <linearGradient id="rndFade">
            <stop offset="0.88" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="rndText"><rect x="156" y="22" width="204" height="78" fill="url(#rndFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 19px; font-weight: 700; fill: #1c1c1a; letter-spacing: -0.25px; }
        .artist { font-size: 14px; font-weight: 500; fill: #62625e; }
        .album { font-size: 12px; font-weight: 400; fill: #8b8b85; }
        .status { font-size: 11px; font-weight: 600; fill: #62625e; }
        .status-playing { fill: #238636; }
        .no-media { font-size: 15px; font-weight: 500; fill: #777772; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0.5" y="0.5" width="399" height="119" rx="18" fill="#f2f2ef" stroke="#d7d7d2"/>

    <g class="container" clip-path="url(#rndCard)">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="0" y="0" width="136" height="120"
                       preserveAspectRatio="xMidYMid slice"/>
            {% else %}
                <rect x="0" y="0" width="136" height="120" fill="#dfdfda"/>
                <text x="68" y="70" text-anchor="middle" font-size="34" fill="#9a9a94">♪</text>
            {% endif %}
            <line x1="136.5" y1="0" x2="136.5" y2="120" stroke="#d7d7d2"/>

            <g mask="url(#rndText)">
                <text x="156" y="{{ 47 if has_album else 55 }}" class="title">{{ (media_info.title)|truncate(38, true, '', 0) }}</text>
                <text x="156" y="{{ 69 if has_album else 79 }}" class="artist">{{ (media_info.artist or '')|truncate(42, true, '', 0) }}</text>
                {% if has_album %}
                <text x="156" y="89" class="album">{{ (media_info.album)|truncate(44, true, '', 0) }}</text>
                {% endif %}
            </g>

            {% if media_info.is_playing %}
                <circle class="status-playing" cx="344" cy="96" r="3.5"/>
                <text x="354" y="100" class="status">Playing</text>
            {% else %}
                <circle cx="344" cy="96" r="3.5" fill="#8b8b85"/>
                <text x="354" y="100" class="status">Paused</text>
            {% endif %}
        {% else %}
            <rect x="0" y="0" width="136" height="120" fill="#dfdfda"/>
            <text x="68" y="70" text-anchor="middle" font-size="34" fill="#9a9a94">♪</text>
            <line x1="136.5" y1="0" x2="136.5" y2="120" stroke="#d7d7d2"/>
            <text x="156" y="65" class="no-media">Nothing is playing</text>
        {% endif %}
    </g>
</svg>
