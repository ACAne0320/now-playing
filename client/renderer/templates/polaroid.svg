<svg width="320" height="360" viewBox="0 0 320 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="plPhoto">
            <rect x="60" y="46" width="200" height="200"/>
        </clipPath>
        <radialGradient id="plDesk" cx="0.5" cy="0.35" r="0.85">
            <stop offset="0" stop-color="#2a231a"/>
            <stop offset="1" stop-color="#15110c"/>
        </radialGradient>
        <linearGradient id="plEmpty" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#d7dce0"/>
            <stop offset="1" stop-color="#a9b2b8"/>
        </linearGradient>
        <filter id="plShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5"/>
        </filter>
    </defs>

    <style>
        .hand { font-family: 'Segoe Script', 'Savoye LET', 'Bradley Hand', 'Comic Sans MS', cursive; }
        .caption { font-size: 17px; fill: #33302b; }
        .sub { font-size: 13px; fill: #8a857c; }
        .below { font-size: 12px; fill: #a5987f; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0" y="0" width="320" height="360" fill="url(#plDesk)"/>

    <!-- shadow -->
    <g transform="rotate(-4 160 168)">
        <rect x="52" y="40" width="232" height="292" rx="3" fill="#000000" opacity="0.45" filter="url(#plShadow)"/>
    </g>

    <!-- polaroid -->
    <g transform="rotate(-4 160 168)">
        <rect x="44" y="30" width="232" height="292" rx="3" fill="#f8f6f1" stroke="#e4dfd2"/>
        {% if media_info and media_info.title and media_info.album_art_b64 %}
        <image href="{{ media_info.album_art_data_uri }}" x="60" y="46" width="200" height="200"
               clip-path="url(#plPhoto)" preserveAspectRatio="xMidYMid slice"/>
        <rect x="60" y="46" width="200" height="200" fill="none" stroke="#000000" stroke-opacity="0.12"/>
        {% else %}
        <rect x="60" y="46" width="200" height="200" fill="url(#plEmpty)"/>
        <text x="160" y="164" text-anchor="middle" font-size="44" fill="#ffffff" opacity="0.75">♪</text>
        <rect x="60" y="46" width="200" height="200" fill="none" stroke="#000000" stroke-opacity="0.12"/>
        {% endif %}

        {% if media_info and media_info.title %}
        <text x="160" y="290" text-anchor="middle" class="hand caption">{{ (media_info.title)|truncate(18, true, '', 0) }}</text>
        <text x="160" y="310" text-anchor="middle" class="hand sub">{{ (media_info.artist or '')|truncate(22, true, '', 0) }}</text>
        {% else %}
        <text x="160" y="296" text-anchor="middle" class="hand sub">no film loaded</text>
        {% endif %}
    </g>

    <!-- tape strip -->
    <g transform="rotate(7 160 34)">
        <rect x="106" y="20" width="108" height="26" fill="#e9d89b" opacity="0.78"/>
        <rect x="106" y="20" width="108" height="26" fill="none" stroke="#d3bf7c" opacity="0.5"/>
    </g>

    {% if media_info and media_info.title %}
    <text x="160" y="348" text-anchor="middle" class="hand below">— {% if media_info.is_playing %}now spinning{% else %}paused{% endif %} —</text>
    {% else %}
    <text x="160" y="348" text-anchor="middle" class="hand below">— nothing playing —</text>
    {% endif %}
</svg>
