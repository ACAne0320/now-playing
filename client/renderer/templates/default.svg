<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <clipPath id="defArt">
            <rect x="16" y="16" width="88" height="88" rx="4"/>
        </clipPath>
        <linearGradient id="defFade">
            <stop offset="0.88" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <mask id="defText"><rect x="124" y="20" width="190" height="80" fill="url(#defFade)"/></mask>
    </defs>

    <style>
        .container { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title { font-size: 18px; font-weight: 700; fill: #f7f7f5; letter-spacing: -0.2px; }
        .artist { font-size: 14px; font-weight: 500; fill: #b5b5b0; }
        .album { font-size: 12px; font-weight: 400; fill: #787874; }
        .status { font-size: 11px; font-weight: 600; fill: #b5b5b0; }
        .status-playing { fill: #1ed760; }
        .no-media { font-size: 15px; font-weight: 500; fill: #8a8a85; }
        {{ custom_css | safe }}
    </style>

    <rect class="background" x="0.5" y="0.5" width="399" height="119" rx="8" fill="#171717" stroke="#30302e"/>
    <line x1="112.5" y1="16" x2="112.5" y2="104" stroke="#30302e"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="16" y="16" width="88" height="88" clip-path="url(#defArt)"
                       preserveAspectRatio="xMidYMid slice"/>
                <rect x="16.5" y="16.5" width="87" height="87" rx="3.5" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
            {% else %}
                <rect x="16" y="16" width="88" height="88" rx="4" fill="#242422"/>
                <text x="60" y="68" text-anchor="middle" font-size="28" fill="#5f5f5a">♪</text>
            {% endif %}

            <g mask="url(#defText)">
                <text x="124" y="{{ 47 if has_album else 55 }}" class="title">{{ (media_info.title)|truncate(44, true, '', 0) }}</text>
                <text x="124" y="{{ 69 if has_album else 79 }}" class="artist">{{ (media_info.artist or '')|truncate(48, true, '', 0) }}</text>
                {% if has_album %}
                <text x="124" y="89" class="album">{{ (media_info.album)|truncate(50, true, '', 0) }}</text>
                {% endif %}
            </g>

            {% if media_info.is_playing %}
                <path class="status-playing" d="M330 84 L330 96 L340 90 Z"/>
                <text x="347" y="94" class="status">Playing</text>
            {% else %}
                <g fill="#686864">
                    <rect x="330" y="84" width="3" height="12" rx="1"/>
                    <rect x="336" y="84" width="3" height="12" rx="1"/>
                </g>
                <text x="347" y="94" class="status">Paused</text>
            {% endif %}
        {% else %}
            <rect x="16" y="16" width="88" height="88" rx="4" fill="#242422"/>
            <text x="60" y="68" text-anchor="middle" font-size="28" fill="#4f4f4b">♪</text>
            <text x="124" y="64" class="no-media">Nothing is playing</text>
        {% endif %}
    </g>
</svg>
