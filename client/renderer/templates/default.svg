<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Now playing">
    <defs>
        <linearGradient id="defBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#222222"/>
            <stop offset="100%" stop-color="#161616"/>
        </linearGradient>
        <clipPath id="defArt">
            <rect x="16" y="16" width="88" height="88" rx="10"/>
        </clipPath>
        <filter id="defShadow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
        </filter>
    </defs>

    <style>
        .container { font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .title  { font-size: 18px; font-weight: 700; fill: #ffffff; letter-spacing: -0.2px; }
        .artist { font-size: 14px; font-weight: 500; fill: #b3b3b3; }
        .album  { font-size: 12px; font-weight: 400; fill: #7d7d7d; }
        .label  { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; }
        .label-playing { fill: #1ed760; }
        .label-paused  { fill: #7d7d7d; }
        .no-media { font-size: 16px; font-weight: 500; fill: #7d7d7d; text-anchor: middle; }
        {{ custom_css | safe }}
    </style>

    <rect x="0.5" y="0.5" width="399" height="119" rx="16" fill="url(#defBg)" stroke="#000000" stroke-opacity="0.4" stroke-width="1"/>

    <g class="container">
        {% if media_info and media_info.title %}
            {% set has_album = media_info.album %}
            {% if media_info.album_art_b64 %}
                <image href="data:image/png;base64,{{ media_info.album_art_b64 }}"
                       x="16" y="16" width="88" height="88" clip-path="url(#defArt)"
                       preserveAspectRatio="xMidYMid slice" filter="url(#defShadow)"/>
                <rect x="16" y="16" width="88" height="88" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
            {% else %}
                <rect x="16" y="16" width="88" height="88" rx="10" fill="#2a2a2a" filter="url(#defShadow)"/>
                <path d="M58 42 v30 a9 9 0 1 1 -5 -8 V50 l22 -5 v20 a9 9 0 1 1 -5 -8 V38 Z" fill="#5a5a5a"/>
            {% endif %}

            <text x="124" y="{{ 47 if has_album else 55 }}" class="title">{{ (media_info.title)|truncate(22, true, '…', 0) }}</text>
            <text x="124" y="{{ 69 if has_album else 79 }}" class="artist">{{ (media_info.artist or '')|truncate(28, true, '…', 0) }}</text>
            {% if has_album %}
            <text x="124" y="90" class="album">{{ (media_info.album)|truncate(32, true, '…', 0) }}</text>
            {% endif %}

            {% if media_info.is_playing %}
                <g transform="translate(332, 70)" fill="#1ed760">
                    <rect x="0"  width="4" rx="2" y="-8"  height="8" ><animate attributeName="height" values="6;20;6"  dur="0.9s"  begin="0s"     repeatCount="indefinite"/><animate attributeName="y" values="-6;-20;-6"  dur="0.9s"  begin="0s"     repeatCount="indefinite"/></rect>
                    <rect x="8"  width="4" rx="2" y="-16" height="16"><animate attributeName="height" values="16;7;16" dur="0.8s"  begin="-0.3s"  repeatCount="indefinite"/><animate attributeName="y" values="-16;-7;-16" dur="0.8s"  begin="-0.3s"  repeatCount="indefinite"/></rect>
                    <rect x="16" width="4" rx="2" y="-11" height="11"><animate attributeName="height" values="9;22;9"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/><animate attributeName="y" values="-9;-22;-9"  dur="1.05s" begin="-0.15s" repeatCount="indefinite"/></rect>
                    <rect x="24" width="4" rx="2" y="-14" height="14"><animate attributeName="height" values="13;5;13" dur="0.75s" begin="-0.5s"  repeatCount="indefinite"/><animate attributeName="y" values="-13;-5;-13" dur="0.75s" begin="-0.5s"  repeatCount="indefinite"/></rect>
                </g>
                <text x="378" y="92" class="label label-playing" text-anchor="end">NOW PLAYING</text>
            {% else %}
                <g transform="translate(340, 56)" fill="#5a5a5a">
                    <rect x="0" y="-9" width="5" height="18" rx="2"/>
                    <rect x="9" y="-9" width="5" height="18" rx="2"/>
                </g>
                <text x="378" y="92" class="label label-paused" text-anchor="end">PAUSED</text>
            {% endif %}
        {% else %}
            <rect x="16" y="16" width="88" height="88" rx="10" fill="#2a2a2a"/>
            <path d="M58 42 v30 a9 9 0 1 1 -5 -8 V50 l22 -5 v20 a9 9 0 1 1 -5 -8 V38 Z" fill="#4a4a4a"/>
            <text x="250" y="65" class="no-media">No music playing</text>
        {% endif %}
    </g>
</svg>
